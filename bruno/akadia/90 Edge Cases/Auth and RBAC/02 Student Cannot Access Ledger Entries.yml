info:
  name: 02 Student Cannot Access Ledger Entries
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/ledger-entries?page=1&size=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: size
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{token_student}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
