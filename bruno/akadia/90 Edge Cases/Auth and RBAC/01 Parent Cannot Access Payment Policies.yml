info:
  name: 01 Parent Cannot Access Payment Policies
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/payment-policies?page=1&size=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: size
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{token_parent}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
