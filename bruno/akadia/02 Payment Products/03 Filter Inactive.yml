info:
  name: 03 Filter Inactive
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/payment-products?status=INACTIVE&page=1&size=50"
  params:
    - name: status
      value: "INACTIVE"
      type: query
    - name: page
      value: "1"
      type: query
    - name: size
      value: "50"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
